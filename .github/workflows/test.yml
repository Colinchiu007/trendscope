name: Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared-models
        run: pip install git+https://github.com/Colinchiu007/shared-models.git

      - name: Install runtime deps (pin explicit to avoid resolver failures)
        run: |
          pip install loguru httpx pydantic>=2.0 fastapi>=0.115 uvicorn[standard]>=0.30 python-jose[cryptography]>=3.3 aiohttp>=3.9 aiofiles>=23

      - name: Install project + test deps
        run: |
          pip install -e . --no-deps
          pip install pytest>=8.0 pytest-asyncio>=0.24 pytest-cov>=5.0

      - name: Run tests
        env:
          PO_SECRET_KEY: ci-test-secret-key-not-for-production
        run: python -m pytest tests/ -v --tb=short -x --ignore=tests/test_pipeline.py
