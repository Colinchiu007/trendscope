name: Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared-models
        run: pip install git+https://github.com/Colinchiu007/shared-models.git

      - name: Install project dependencies + test deps
        run: |
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests (exclude crawler subproject tests)
        env:
          PO_SECRET_KEY: ci-test-secret-key-not-for-production
        run: python -m pytest tests/ -v --tb=short -x --ignore=tests/test_pipeline.py
