name: Doc Sync Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  doc-sync:
    name: 文档同步检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查 CHANGELOG
        run: |
          if ! git diff --name-only origin/main | grep -q "CHANGELOG"; then
            echo "⚠️ 未检测到 CHANGELOG 变更"
            echo "如果本次 PR 不需要更新 CHANGELOG，请确认后继续"
          else
            echo "✅ CHANGELOG 已更新"
          fi

      - name: 检查 PRD 同步
        run: |
          CHANGED=$(git diff --name-only origin/main)
          SRC_CHANGED=$(echo "$CHANGED" | grep -c "^src/" || true)
          PRD_CHANGED=$(echo "$CHANGED" | grep -c "^docs/PRD.md" || true)
          if [ "$SRC_CHANGED" -gt 0 ] && [ "$PRD_CHANGED" -eq 0 ]; then
            echo "⚠️  src/ 有变更但 docs/PRD.md 未更新"
            echo "如果不需要更新 PRD，请在 PR 描述中说明原因"
          else
            echo "✅ PRD 同步检查通过"
          fi

  backend-tests:
    name: 后端测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -r requirements.txt 2>/dev/null || echo "无依赖配置"
          pip install pytest pytest-asyncio httpx

      - name: 运行测试
        run: |
          if [ -d tests ]; then
            python -m pytest tests/ -v --timeout=30 -x --tb=short 2>&1 || true
          else
            echo "⚠️ 无 tests/ 目录，跳过后端测试"
          fi

  frontend-build:
    name: 前端构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装 + 构建
        run: |
          if [ -d frontend ]; then
            cd frontend && npm ci --legacy-peer-deps && npm run build 2>&1 || echo "⚠️ 前端构建有警告"
          else
            echo "⚠️ 无 frontend/ 目录，跳过"
          fi
