# TrendScope Nginx 反向代理配置
# 部署路径: /etc/nginx/conf.d/trendscope.conf

upstream trendscope_api {
    server 127.0.0.1:8001;
}

upstream trendscope_frontend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name trendscope.cn www.trendscope.cn;

    # 重定向到 HTTPS（生产环境）
    # return 301 https://$host$request_uri;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # 前端页面（SSR）
    location / {
        proxy_pass http://trendscope_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # API 接口
    location /api/ {
        proxy_pass http://trendscope_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 限流（API 级别）
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        # 安全头
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    # 健康检查
    location /health {
        proxy_pass http://trendscope_api;
        access_log off;
    }

    # 静态资源缓存
    location /_next/static {
        proxy_pass http://trendscope_frontend;
        proxy_cache static_cache;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# 限流区域
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# 静态缓存
proxy_cache_path /var/cache/nginx/trendscope levels=1:2 keys_zone=static_cache:10m max_size=100m inactive=365d;
